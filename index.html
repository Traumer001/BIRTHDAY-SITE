<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Khushi 💖</title>

    <style>
      body {
        margin: 0;
        font-family: Georgia, serif;
        text-align: center;
        background: black;
        overflow: hidden;
      }

      /* Slideshow */
      .slideshow {
        position: fixed;
        width: 100%;
        height: 100%;
      }

      .slide {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        animation: slideShow 15s infinite;
      }

      .slide img {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        max-width: 80%;
        max-height: 80%;
        border-radius: 15px;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
      }

      .slide::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        filter: blur(25px);
        transform: scale(1.2);
        z-index: -1;
      }

      .slide:nth-child(1)::before {
        background: url("photo1.jpg") center/cover;
      }
      .slide:nth-child(2)::before {
        background: url("photo2.jpg") center/cover;
      }
      .slide:nth-child(3)::before {
        background: url("photo3.jpg") center/cover;
      }

      .slide:nth-child(1) {
        animation-delay: 0s;
      }
      .slide:nth-child(2) {
        animation-delay: 5s;
      }
      .slide:nth-child(3) {
        animation-delay: 10s;
      }

      @keyframes slideShow {
        0% {
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        30% {
          opacity: 1;
        }
        40% {
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }

      /* overlay */
      .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
      }

      /* content */
      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      h1 {
        color: gold;
        font-size: 3rem;
      }

      h2 {
        color: pink;
      }

      /* message */
      #message {
        margin-top: 20px;
        font-size: 22px;
        color: #e0ffff;
        white-space: pre-line;
      }

      /* button */
      button {
        padding: 12px 25px;
        border-radius: 25px;
        border: none;
        cursor: pointer;
      }

      /* hearts */
      .heart {
        position: fixed;
        bottom: -10px;
        color: #ff4d6d;
        animation: floatHearts 6s linear infinite;
      }

      @keyframes floatHearts {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-100vh);
        }
      }

      /* fireworks (SLOW & PREMIUM) */
      .firework {
        position: fixed;
        width: 6px;
        height: 6px;
        background: #ffcc00;
        border-radius: 50%;
        animation: explode 1.5s ease-out forwards;
      }

      @keyframes explode {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(20);
          opacity: 0;
        }
      }

      /* popup */
      #popup {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 0 20px black;
        z-index: 1000;
      }
    </style>
  </head>

  <body>
    <div class="slideshow">
      <div class="slide"><img src="b3.jpeg" /></div>
      <div class="slide"><img src="b2.jpeg" /></div>
      <div class="slide"><img src="b3.jpeg" /></div>
    </div>

    <div class="overlay">
      <div class="container">
        <h1>🎉 Happy Birthday 🎂</h1>
        <h2>Khushi 💖</h2>

        <button onclick="start()">Open Your Surprise ✨</button>

        <div id="message"></div>
      </div>
    </div>

    <!-- Popup -->
    <div id="popup">
      <h2 style="color: red">💖 I Love You Khushi 💖</h2>
      <p style="color: black">You are the most special person in my life ❤️</p>
      <button onclick="closePopup()">Close</button>
    </div>

    <!-- Music -->
    <audio
      id="music"
      src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"
    ></audio>

    <script>
      let text =
        "🌸 Wishing you a day filled with love,\n😊 joy and happiness,\n💖 and a year full of beautiful moments.\n\n💌 Tumhari muskaan hi meri khushi hai,\nTum ho to sab kuch hai...\n\n🎂 Happy Birthday Khushi ❤️";

      let i = 0;

      function start() {
        document.getElementById("music").play();
        typeEffect();
        createHearts();
        createFireworks();
        setTimeout(showPopup, 5000);
      }

      function typeEffect() {
        if (i < text.length) {
          document.getElementById("message").innerHTML += text.charAt(i);
          i++;
          setTimeout(typeEffect, 40);
        }
      }

      function createHearts() {
        setInterval(() => {
          let heart = document.createElement("div");
          heart.classList.add("heart");
          heart.innerHTML = "💖";
          heart.style.left = Math.random() * 100 + "vw";
          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 6000);
        }, 300);
      }

      /* SLOW FIREWORKS */
      function createFireworks() {
        setInterval(() => {
          let firework = document.createElement("div");
          firework.classList.add("firework");
          firework.style.left = Math.random() * 100 + "vw";
          firework.style.top = Math.random() * 100 + "vh";
          document.body.appendChild(firework);
          setTimeout(() => firework.remove(), 1500);
        }, 1200); // ⬅️ slow speed
      }

      function showPopup() {
        document.getElementById("popup").style.display = "block";
      }

      function closePopup() {
        document.getElementById("popup").style.display = "none";
      }
    </script>
  </body>
</html>
